name: Build nasdash fpk

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Make build scripts executable
        run: chmod +x build.sh verify.sh test.sh local_smoke.sh

      - name: Python syntax check (app.py)
        run: python3 -m py_compile app.py

      - name: Parser unit tests (pytest)
        run: ./test.sh

      - name: Local smoke test (hardware may be absent -> WARN only)
        run: ./local_smoke.sh
        continue-on-error: true

      - name: Build fpk + consistency verify
        run: ./build.sh

      - name: Upload fpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasdash-fpk
          path: nasdash.fpk
