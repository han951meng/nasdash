    }).join('')||'<div class="loading">未检测到</div>'}
  </div>`;
  let sysConfig = `
  <div class="detect-cards">
    <div class="card">
      <h3>处理器</h3>
      <div class="kv"><span class="k">型号</span><span class="v">${s.cpu_model||'-'}</span></div>
      <div class="kv"><span class="k">核心/线程</span><span class="v">${s.cpu_cores||0}核 / ${s.cpu_threads||0}线程</span></div>
      <div class="kv"><span class="k">CPU 温度</span><span class="v" style="color:${tempColor(s.cpu_temp,100)}">${s.cpu_temp!=null?s.cpu_temp+'°C':'N/A'}</span></div>
      <div class="kv"><span class="k">负载占用</span><span class="v">${cpuPct}%</span></div>
      ${(s.gpus&&s.gpus.length)?s.gpus.map(g=>`<div class="kv"><span class="k">显卡</span><span class="v">${g}</span></div>`).join(''):''}
    </div>
    ${boardCard}
    ${memCard}
    ${netCard}
    ${sysInfoCard}
  </div>`;
  // 阵列卡 & 磁盘
  let raidCard;
  if(r.mode==='mega'){
    raidCard = `
    <div class="card">
      <h3>RAID 控制器</h3>
      <div class="kv"><span class="k">型号</span><span class="v">${r.model}</span></div>
      <div class="kv"><span class="k">模式</span><span class="v"><span class="badge b-info">MegaRAID (IR)</span></span></div>
      <div class="kv"><span class="k">状态</span><span class="v" style="color:var(--green)">✓ 正常</span></div>
      <div class="kv"><span class="k">芯片温度</span><span class="v" style="color:${tempColor(r.controller_temp,85)}">${r.controller_temp!=null?r.controller_temp+'°C':'N/A'}</span></div>
      <div class="kv"><span class="k">物理盘</span><span class="v">${r.drives?r.drives.length:0} 块</span></div>
      <div class="kv"><span class="k">固件</span><span class="v">${r.fw_package||'-'}</span></div>
    </div>`;
  } else if(r.mode==='hba'){
    raidCard = `
    <div class="card">
      <h3>控制器 (HBA 直通)</h3>
      <div class="kv"><span class="k">型号</span><span class="v">${r.model}</span></div>
      <div class="kv"><span class="k">模式</span><span class="v"><span class="badge b-info">IT 直通</span></span></div>
      <div class="kv"><span class="k">状态</span><span class="v" style="color:var(--green)">✓ 正常工作</span></div>
      <div class="kv"><span class="k">温度</span><span class="v" style="color:var(--muted)">卡无传感器 · 见「硬盘 SMART」</span></div>
    </div>`;
  } else {
    raidCard = `<div class="card"><h3>阵列卡</h3><div class="loading">${r.note||'未检测到阵列卡'}</div></div>`;
  }
  let diskItem = d => {
    let t = (d.type||'').toUpperCase();
    let isSas = t==='SAS';
    let typeBadge = `<span class="badge ${isSas?'b-sas':'b-sata'}">${isSas?'SAS':'SATA'}</span>`;
    return `<div class="disk-mini">
      <span>${typeBadge} ${d.dev} · ${d.brand?d.brand+' ':''}${d.vendor?d.vendor+' ':''}${d.model}${d.feature?` <span class="badge b-info">${d.feature}</span>`:''}</span>
      <span><span style="color:${tempColor(d.temp,d.temp_trip||60)};font-weight:600">${d.temp!=null?d.temp+'°C':'N/A'}</span> · <span class="badge ${d.health_ok?'b-ok':'b-bad'}">${d.health}</span></span>
    </div>`;
  };
  // 复用上方状态栏已声明的 sasDisks/sataDisks（同 filter 逻辑），避免 let 重复声明致 JS 解析崩溃
  sasDisks = disks.filter(d=>(d.type||'').toUpperCase()==='SAS');
  sataDisks = disks.filter(d=>{let t=(d.type||'').toUpperCase(); return t==='SATA'||t==='ATA';});
  let otherDisks = disks.filter(d=>{let t=(d.type||'').toUpperCase(); return t!=='SAS'&&t!=='SATA'&&t!=='ATA';});
  let diskMini = '';
  if(sasDisks.length) diskMini += `<div class="disk-group-title">SAS 硬盘 (${sasDisks.length})</div>` + sasDisks.map(diskItem).join('');
  if(sataDisks.length) diskMini += `<div class="disk-group-title">SATA 硬盘 (${sataDisks.length})</div>` + sataDisks.map(diskItem).join('');
  if(otherDisks.length) diskMini += `<div class="disk-group-title">其他硬盘 (${otherDisks.length})</div>` + otherDisks.map(diskItem).join('');
  if(!disks.length) diskMini = '<div class="loading">未检测到硬盘</div>';
  let raidDisk = `
  <div class="detect-cards">
    ${raidCard}
    <div class="card">
      <h3>磁盘健康 (SMART)</h3>
      ${diskMini}
    </div>
  </div>`;
  // 存储卷、Docker 容器列表均已移至左侧独立标签页，硬件配置检测仅保留概览状态栏
  return `
  <div class="detect-title">硬件配置检测</div>
  <div class="detect-sub">实时监测设备健康状态与硬件详情 · {{ APP_VERSION }}</div>
  ${statusBar}
  <div class="detect-title" style="font-size:16px;margin-bottom:10px">系统配置</div>
  ${sysConfig}
  <div class="detect-title" style="font-size:16px;margin:18px 0 10px">阵列卡 &amp; 磁盘</div>
  ${raidDisk}
  `;
}

function renderDocker(dk){
  if(!dk) dk={};
  let head = `
  <div class="grid-2">
    <div class="card">
      <h3>容器概览</h3>
      <div class="kv"><span class="k">运行中</span><span class="v" style="color:var(--green)">${dk.running||0}</span></div>
      <div class="kv"><span class="k">总数</span><span class="v">${dk.total||0}</span></div>
      <div class="kv"><span class="k">状态</span><span class="v" style="color:${dk.ok?'var(--green)':'var(--red)'}">${dk.ok?'正常':'读取失败'}</span></div>
    </div>
    <div class="card">
      <h3>说明</h3>
      <div style="font-size:13px;color:var(--muted);line-height:1.7">列出所有容器及其运行状态、占用内存与端口映射。内存仅对运行中容器有效；停止的容器显示 N/A。</div>
    </div>
  </div>`;
  let rows = (dk.containers&&dk.containers.length) ? dk.containers.map(c=>{
    let badge = c.running?'b-ok':'b-warn';
    let stateTxt = c.running?'运行':'停止';
    let mem = c.mem||'N/A';
    let ports = c.ports||'-';
    return `<tr>
      <td><span class="badge ${badge}">${stateTxt}</span></td>
      <td><b>${c.name}</b><br><span style="font-size:12px;color:var(--muted)">${c.image}</span></td>
      <td style="white-space:nowrap;text-align:right">${c.cpu!=null?c.cpu.toFixed(1)+'%':'—'}</td>
      <td style="white-space:nowrap">${mem}${c.mem_pct!=null?'<br><small style="color:var(--muted)">'+c.mem_pct.toFixed(1)+'%</small>':''}</td>
      <td style="font-size:12px;white-space:nowrap">↓${fmtSpeed(c.net_rx)}<br>↑${fmtSpeed(c.net_tx)}</td>
      <td style="font-size:12px">${ports}</td>
      <td style="font-size:12px;color:var(--muted)">${c.runtime}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="7" class="loading">未检测到 Docker / 无容器</td></tr>';
  let table = `
  <div class="section-title" style="margin-top:14px">容器列表</div>
  <div class="card">
    <table class="table"><thead><tr><th>状态</th><th>名称 / 镜像</th><th>CPU</th><th>内存</th><th>网络 (↓收/↑发)</th><th>端口映射</th><th>运行时长</th></tr></thead><tbody>${rows}</tbody></table>
  </div>`;
  return head + table;
}

async function loadAutomationConfig(){

    fillAutomationConfig(j.config||{});
    lastAlerts=j.alerts||[];
    renderAutomationAlerts(lastAlerts);
  }catch(e){}
}

  c=c||{};
  var el=document.getElementById('au-enabled'); if(el) el.checked=!!c.enabled;
  var t=c.temp||{};
  el=document.getElementById('au-temp-enabled'); if(el) el.checked=(t.enabled!==false);
  el=document.getElementById('au-cpu-max'); if(el) el.value=(t.cpu_max!=null?t.cpu_max:85);
  el=document.getElementById('au-mb-max'); if(el) el.value=(t.mb_max!=null?t.mb_max:75);
  el=document.getElementById('au-disk-max'); if(el) el.value=(t.disk_max!=null?t.disk_max:60);
  el=document.getElementById('au-disk-health'); if(el) el.checked=!!c.disk_health;
  el=document.getElementById('au-mem-max'); if(el) el.value=(c.memory_max!=null?c.memory_max:90);
  var ch=c.channels||{};
  el=document.getElementById('au-ch-system'); if(el) el.checked=(ch.system!==false);
  var tg=ch.telegram||{}; el=document.getElementById('au-tg-en'); if(el) el.checked=!!tg.enabled;

function renderAutomationAlerts(alerts){
  var ul=document.getElementById('auto-alert-list');
  if(!ul) return;
  if(!alerts||!alerts.length){ ul.innerHTML='<li class="ok">✓ 当前无活动告警</li>'; return; }
  ul.innerHTML=alerts.map(function(a){
    return '<li class="'+(a.level==='danger'?'danger':'warn')+'"><b>'+esc(a.title)+'</b> — '+esc(a.detail)+'</li>';
  }).join('');
}
async function initAutomation(){
  var box=document.getElementById('automation');
  if(!box) return;
  box.innerHTML=renderAutomation();
  await loadAutomationConfig();
  if(autoTimer) clearInterval(autoTimer);
  autoTimer=setInterval(refreshAutomationAlerts, 15000);
}
async function initManual(){

async function refreshAutomationAlerts(){

async function saveAutomationConfig(){
  var st=document.getElementById('au-save-state');
  var g=function(id){var e=document.getElementById(id);return e?e.checked:false;};
  var v=function(id){var e=document.getElementById(id);return e?e.value:'';};
  var cfg={
    enabled:g('au-enabled'),
    disk_health:g('au-disk-health'),
    memory_max:parseFloat(v('au-mem-max'))||90,
    temp:{enabled:g('au-temp-enabled'), cpu_max:parseFloat(v('au-cpu-max'))||85, mb_max:parseFloat(v('au-mb-max'))||75, disk_max:parseFloat(v('au-disk-max'))||60},
    channels:{
      system:g('au-ch-system'),
      telegram:{enabled:g('au-tg-en'), bot_token:v('au-tg-token'), chat_id:v('au-tg-chat')},
      bark:{enabled:g('au-bark-en'), url:v('au-bark-url')},
      email:{enabled:g('au-em-en'), smtp_host:v('au-em-host'), smtp_port:parseInt(v('au-em-port'))||465, user:v('au-em-user'), pass:v('au-em-pass'), to:v('au-em-to')}
    }
  };
  if(st){ st.textContent='保存中…'; st.className='dt-save-state'; }
  try{
    var r=await fetch('/api/alerts/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});
    var j=await r.json();
    if(st){ st.textContent=j.ok?'已保存 ✓':'失败：'+(j.error||''); st.className=j.ok?'dt-save-state ok':'dt-save-state'; }
  }catch(e){ if(st){ st.textContent='请求失败'; st.className='dt-save-state'; } }
}

async function exportReport(fmt){
  try{
    var ts=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    var r=await fetch('/api/report?format='+fmt+'&_='+Date.now());
    if(fmt==='json'){
      var j=await r.json();
      var blob=new Blob([JSON.stringify(j,null,2)],{type:'application/json'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='nasdash-report-'+ts+'.json'; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
    } else {
      var html=await r.text();
      var blob=new Blob([html],{type:'text/html;charset=utf-8'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='nasdash-report-'+ts+'.html'; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
    }
  }catch(e){ alert('导出失败：'+e); }
}
// 全局告警横幅
let alertsDismissed=false;
function showAlerts(alerts){
  var banner=document.getElementById('alertBanner');
  if(!banner) return;
  alerts=alerts||[];
  if(!alerts.length || alertsDismissed){ banner.classList.remove('show'); return; }
  var txt=document.getElementById('alertText'); if(txt) txt.textContent='检测到 '+alerts.length+' 项告警：';
  var ul=document.getElementById('alertList');
  if(ul) ul.innerHTML=alerts.map(function(a){return '<li>'+esc(a.title)+'：'+esc(a.detail)+'</li>';}).join('');
  banner.classList.add('show');
}
function dismissAlerts(){ alertsDismissed=true; var b=document.getElementById('alertBanner'); if(b) b.classList.remove('show'); }

function renderAll(){
  if(!DATA) return;
  if(DATA.error){
    document.querySelectorAll('.panel').forEach(p=>p.innerHTML='<div class="card"><div class="loading" style="color:var(--red)">加载失败: '+DATA.error+'</div></div>');
    return;
  }
  document.getElementById('detect').innerHTML = renderDetect(DATA);
  document.getElementById('raid').innerHTML = renderRaid(DATA.raid, DATA.disks);
  document.getElementById('disks').innerHTML = renderDisks(DATA.disks);
  document.getElementById('system').innerHTML = renderSystem(DATA.system);
  let _fa=document.activeElement;
  let _fanBusy = _fa && (_fa.classList.contains('fan-slider') || _fa.classList.contains('fan-custom-input'));
  var _sd=_snapTemp('#disk-temp-panel'), _ss=_snapTemp('#sys-temp-panel');
  if(!_fanBusy){
    document.getElementById('fan').innerHTML = renderFanControl();
    bindFanSliders();
    // 重渲染会把 fcs-panel 重置为静态“加载中”，必须重新拉取一次 FCS 状态，
    // 否则首次轮询数据回来后卡片会永久卡在“加载系统风扇服务状态…”。
    loadFcsStatus();
  }
  // 正在拖动滑块/编辑自定义占空比时跳过风扇页整页重建，避免打断操作；转速数值由 fetchFanStatus 每2秒刷新
  document.getElementById('storage').innerHTML = renderStorage(DATA.storage);
  document.getElementById('docker').innerHTML = renderDocker(DATA.docker);
  document.getElementById('lastUpdate').textContent = '更新于 '+DATA.time+' ('+DATA.elapsed+'s)';
  initDiskTemp(_sd);
  initSysTemp(_ss);
  showAlerts(DATA.alerts);
}

// ===================== 历史趋势图 =====================
let histRange = '24h';
let _histInited = false;
function fmtTime(ts){
  const d = new Date(ts);
  const p = n => String(n).padStart(2,'0');
  return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function getCSS(v){ return (getComputedStyle(document.documentElement).getPropertyValue(v)||'').trim(); }
function initHistory(){
  const box = document.getElementById('sys-hist');
  if(box && !_histInited){
    box.innerHTML = `
      <div class="section-title">磁盘 I/O 历史趋势</div>
      <div class="card">
        <div class="seg">
          <button class="seg-btn active" data-range="24h">24小时</button>
          <button class="seg-btn" data-range="7d">7天</button>
          <button class="seg-btn" data-range="30d">30天</button>
        </div>
        <canvas id="hist-canvas" style="width:100%;height:170px;margin-top:10px;display:block"></canvas>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">读 <span style="color:#4aa3ff">■</span> &nbsp; 写 <span style="color:#ff7a59">■</span> &nbsp; 速率自适应 B/s·KB/s·MB/s（数据自部署起累积，自动保留 30 天）</div>
      </div>`;
    box.querySelectorAll('.seg-btn').forEach(b=>{
      b.onclick = ()=>{
        box.querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        histRange = b.dataset.range;
        loadHistory();
      };
    });
    _histInited = true;
  }
}
function drawHist(d){
  const cv = document.getElementById('hist-canvas');
  if(!cv) return;
  const pts = (d && d.points) || [];
  const dpr = window.devicePixelRatio || 1;
  const cssW = cv.clientWidth || 600, cssH = 170;
  cv.width = Math.round(cssW*dpr); cv.height = Math.round(cssH*dpr);
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,cssW,cssH);
  const muted = getCSS('--muted') || '#8a93a6';
  if(!pts.length){
    ctx.fillStyle = muted; ctx.font='13px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('暂无数据（需运行一段时间后才会有历史记录）', cssW/2, cssH/2);
    return;
  }
  const maxV = Math.max(1, ...pts.map(p=>Math.max(p.disk_read||0, p.disk_write||0)));
  const padL=46, padR=10, padT=10, padB=20;
  const X = i => padL + (cssW-padL-padR)*(i/((pts.length-1)||1));
  const Y = v => (cssH-padB) - (cssH-padB-padT)*(v/maxV);
  ctx.strokeStyle='rgba(128,128,128,0.15)'; ctx.lineWidth=1;
  ctx.fillStyle=muted; ctx.font='10px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let g=0; g<=3; g++){
    const yy = padT + (cssH-padT-padB)*(g/3);
    ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(cssW-padR, yy); ctx.stroke();
    ctx.fillText(fmtSpeed(maxV*(1-g/3)), padL-4, yy);
  }
  const line=(key,color)=>{ ctx.strokeStyle=color; ctx.lineWidth=1.6; ctx.beginPath(); pts.forEach((p,i)=>{ const xx=X(i), yy=Y(p[key]||0); i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy);}); ctx.stroke(); };
  line('disk_read','#4aa3ff');
  line('disk_write','#ff7a59');
  ctx.fillStyle=muted; ctx.textBaseline='alphabetic';
  ctx.textAlign='left'; ctx.fillText(fmtTime(pts[0].ts), padL, cssH-6);
  ctx.textAlign='right'; ctx.fillText(fmtTime(pts[pts.length-1].ts), cssW-padR, cssH-6);
}
async function loadHistory(){
  try{
    let r = await fetch('/api/history?range='+histRange+'&_='+Date.now());
    let d = await r.json();
    drawHist(d);
  }catch(e){}
}

async function loadData(){
  document.getElementById('spin').style.display='inline-block';
  try{
    let r = await fetch('/api/all?_='+Date.now());
    DATA = await r.json();
    renderAll();
    initHistory();
    loadHistory();
  }catch(e){
    document.getElementById('lastUpdate').textContent = '加载失败: '+e;
  }
  document.getElementById('spin').style.display='none';
}

// 定时刷新只刷「当前正在看的板块」，不再每 30s 全量 /api/all
function autoRefreshTick(){ refreshPanel(currentTab()); }
var ar = document.getElementById('autoRefresh');
ar.addEventListener('change', function(){
  if(this.checked){ timer=setInterval(autoRefreshTick, 30000); }
  else if(timer){ clearInterval(timer); timer=null; }
  try{ localStorage.setItem('nasdash_autorefresh', this.checked ? '1':'0'); }catch(e){}
});
try{
  if(localStorage.getItem('nasdash_autorefresh') === '1'){
    ar.checked = true;
    timer = setInterval(autoRefreshTick, 30000);
  }
}catch(e){}

loadData();  // 首屏仍全量拉取一次，打底填充所有板块 DATA

// ---------- 检测新版本 ----------
let updateDismissed = false;
async function checkUpdate(force){
  const banner = document.getElementById('updateBanner');
  if(!force && updateDismissed) return;
  if(force){
    const btn = document.getElementById('checkUpdateBtn');
    if(btn){ btn.disabled = true; btn.textContent = '🔔 检查中…'; }
  }
  try{
    const r = await fetch('/api/version' + (force ? '?force=1' : ''));
    const d = await r.json();
    const link = document.getElementById('updateLink');
    if(d.update_available && d.latest){
      document.getElementById('updateText').innerHTML = '发现新版本 <b>'+d.latest+'</b>（当前 '+d.current+'）';
      link.href = d.url || 'https://github.com/han951meng/nasdash/releases';
      link.style.display = '';
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
      link.style.display = 'none';
      if(force){
        if(d.error){
          document.getElementById('updateText').textContent = '检查更新失败：' + d.error;
        } else {
          document.getElementById('updateText').textContent = '已是最新版本（'+d.current+'）';
        }
        banner.classList.add('show');
        if(!d.error){ setTimeout(()=>banner.classList.remove('show'), 3500); }
      }
    }
  }catch(e){
    if(force){
      document.getElementById('updateText').textContent = '检查更新出错：' + e;
      banner.classList.add('show');
    }
  }finally{
    if(force){
      const btn = document.getElementById('checkUpdateBtn');
      if(btn){ btn.disabled = false; btn.textContent = '🔔 检查更新'; }
    }
  }
}
function dismissUpdate(){ document.getElementById('updateBanner').classList.remove('show'); updateDismissed = true; }

checkUpdate(false);
